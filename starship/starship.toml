"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts (default: true)
add_newline = false


format = """\
[Óā∂](bg:transparent fg:#7DF9AA)\
[ůįÄĶ ](bg:#7DF9AA fg:#090c0c)\
[Óāį](fg:#7DF9AA bg:#1C3A5E)\
$time\
[Óāį](fg:#1C3A5E bg:#3B76F0)\
$directory\
[Óāį](fg:#3B76F0 bg:#FCF392)\
$git_branch\
$git_status\
$git_metrics\
[Óāį ](fg:#FCF392 bg:transparent)\
"""

[directory]
format = "[ ÔĄē  $path ]($style)"
style = "fg:#E4E4E4 bg:#3B76F0"

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "ÓúČ Ôźė "
style = "fg:#1C3A5E bg:#FCF392"

[git_status]
format = '[$all_status]($style)'
style = "fg:#1C3A5E bg:#FCF392"

[git_metrics]
format = "([+$added]($added_style))[]($added_style)"
added_style = "fg:#1C3A5E bg:#FCF392"
deleted_style = "fg:bright-red bg:235"
disabled = false

[hg_branch]
format = "[ $symbol$branch ]($style)"
symbol = "Ôźė "

[character]
success_symbol = '[‚ěú](fg:#E4E4E4 bg:#3B76F0)'
error_symbol = '[‚úó](fg:#E4E4E4 bg:#3B76F0)'
format = '$symbol'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ůĪĎć $time ](bg:#1C3A5E fg:#8DFBD2)]($style)'
